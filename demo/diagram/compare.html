<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagram Fidelity — Mermaid vs Excalidraw</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 24px 16px 80px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.8rem;
    margin-bottom: 28px;
  }

  .case {
    background: #232340;
    border: 1px solid #3a3a5c;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .case-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #1e1e38;
    border-bottom: 1px solid #3a3a5c;
    cursor: pointer;
    user-select: none;
  }
  .case-header:hover { background: #282850; }
  .case-num {
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    background: #4a4a80;
    border-radius: 4px;
    padding: 2px 7px;
    min-width: 32px;
    text-align: center;
  }
  .case-num.ok   { background: #1a6b35; }
  .case-num.warn { background: #7a5a00; }
  .case-num.miss { background: #5a1a1a; }
  .case-title { font-size: 0.85rem; color: #c0c0d8; flex: 1; font-family: 'Courier New', monospace; }
  .case-src    { font-size: 0.72rem; color: #7878a0; max-width: 420px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .case-toggle { color: #666; font-size: 0.8rem; transition: transform 0.2s; }
  .case.open .case-toggle { transform: rotate(90deg); }

  .case-body { display: none; padding: 16px; gap: 16px; }
  .case.open .case-body { display: flex; }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .col-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #7070a0;
    text-align: center;
  }
  .col-label.mine { color: #70a070; }

  .img-wrap {
    width: 100%;
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
  }
  .img-wrap img, .img-wrap svg {
    max-width: 100%;
    max-height: 400px;
    display: block;
  }

  .missing {
    color: #666;
    font-size: 0.75rem;
    padding: 20px;
    text-align: center;
  }

  .legend {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111128;
    border-top: 1px solid #3a3a5c;
    padding: 10px 20px;
    display: flex;
    gap: 24px;
    font-size: 0.75rem;
    color: #888;
    z-index: 100;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.ok   { background: #1a6b35; }
  .dot.warn { background: #7a5a00; }
  .dot.miss { background: #5a1a1a; }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid #3a3a5c;
    background: #232340;
    color: #888;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .filter-btn.active { background: #4a4a80; color: #fff; border-color: #6a6ab0; }

  .stats {
    text-align: center;
    margin-bottom: 16px;
    font-size: 0.8rem;
    color: #888;
  }

  .section-title {
    font-size: 1rem;
    color: #a0a0c0;
    margin: 30px 0 15px 0;
    padding-bottom: 8px;
    border-bottom: 1px solid #3a3a5c;
  }
</style>
</head>
<body>

<h1>Diagram Fidelity — Mermaid vs Excalidraw</h1>
<div class="subtitle">Visual comparison: Mermaid SVG (left) vs Excalidraw PNG (right)</div>

<div class="stats" id="stats"></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterAll()">All</button>
  <button class="filter-btn" onclick="filterOk()">✓ Has PNG</button>
  <button class="filter-btn" onclick="filterMiss()">✗ Missing PNG</button>
</div>

<div id="cases"></div>

<div class="legend">
  <span><span class="dot ok"></span> Excalidraw PNG rendered</span>
  <span><span class="dot miss"></span> PNG missing</span>
</div>

<script>
const SVG_BASE  = '../../.tmp/visual-compare/svgs/';
const PNG_BASE  = '../../.tmp/visual-compare/png-out/';
const MMD_BASE  = '../flowchart/';

// Flowcharts 00-50
const FLOWCHARTS = Array.from({length: 51}, (_, i) => ({
  name: `flowchart-${i.toString().padStart(2, '0')}`,
  type: 'flowchart',
  hasSvg: true
}));

// State diagrams and class demo (no Mermaid SVG, only Excalidraw)
const EXTRA = [
  { name: 'state-basic', type: 'state', hasSvg: false },
  { name: 'state-composite', type: 'state', hasSvg: false },
  { name: 'state-concurrency', type: 'state', hasSvg: false },
  { name: 'state-nested', type: 'state', hasSvg: false },
  { name: 'class-demo', type: 'class', hasSvg: false }
];

const ALL_DIAGRAMS = [...FLOWCHARTS, ...EXTRA];

async function loadImage(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    if (url.endsWith('.svg')) {
      const txt = await r.text();
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(txt);
    }
    return url;
  } catch { return null; }
}

async function build() {
  const container = document.getElementById('cases');
  const items = [];
  let hasCount = 0;

  // Flowcharts section
  const flowTitle = document.createElement('div');
  flowTitle.className = 'section-title';
  flowTitle.textContent = `Flowcharts (${FLOWCHARTS.length})`;
  container.appendChild(flowTitle);

  for (const diag of FLOWCHARTS) {
    const num = diag.name.split('-')[1];
    const mmdUrl = MMD_BASE + diag.name + '.mmd';
    const svgUrl = SVG_BASE + diag.name + '.svg';
    const pngUrl = PNG_BASE + diag.name + '.png';

    const svgData = await loadImage(svgUrl);
    const pngData = await loadImage(pngUrl);
    const hasPng = !!pngData;
    if (hasPng) hasCount++;

    // Read .mmd source for title
    let srcLine = '';
    try {
      const r = await fetch(mmdUrl);
      if (r.ok) {
        const txt = await r.text();
        const lines = txt.trim().split('\n');
        srcLine = lines.slice(1).join(' ').trim().substring(0, 80);
      }
    } catch {}

    const status = hasPng ? 'ok' : 'miss';

    const svgCol = svgData
      ? `<div class="img-wrap"><img src="${svgData}" alt="Mermaid SVG" title="Mermaid SVG" /></div>`
      : `<div class="img-wrap"><div class="missing">SVG not found</div></div>`;

    const pngCol = pngData
      ? `<div class="img-wrap"><img src="${pngData}" alt="Excalidraw PNG" title="Excalidraw PNG" /></div>`
      : `<div class="img-wrap"><div class="missing">PNG not rendered</div></div>`;

    const el = document.createElement('div');
    el.className = `case ${status === 'ok' ? 'open' : ''}`;
    el.dataset.status = status;
    el.dataset.type = 'flowchart';
    el.innerHTML = `
      <div class="case-header" onclick="toggle(this)">
        <span class="case-num ${status}">${num}</span>
        <span class="case-title">${diag.name}.mmd</span>
        <span class="case-src">${srcLine || '—'}</span>
        <span class="case-toggle">&#9658;</span>
      </div>
      <div class="case-body">
        <div class="col">
          <div class="col-label">Mermaid SVG</div>
          ${svgCol}
        </div>
        <div class="col">
          <div class="col-label mine">Excalidraw PNG</div>
          ${pngCol}
        </div>
      </div>
    `;
    container.appendChild(el);
    items.push(el);
  }

  // Extra diagrams section
  const extraTitle = document.createElement('div');
  extraTitle.className = 'section-title';
  extraTitle.textContent = `State & Class Diagrams (${EXTRA.length})`;
  container.appendChild(extraTitle);

  for (const diag of EXTRA) {
    const pngUrl = PNG_BASE + diag.name + '.png';
    const pngData = await loadImage(pngUrl);
    const hasPng = !!pngData;
    if (hasPng) hasCount++;

    const status = hasPng ? 'ok' : 'miss';

    const pngCol = pngData
      ? `<div class="img-wrap"><img src="${pngData}" alt="Excalidraw PNG" title="Excalidraw PNG" /></div>`
      : `<div class="img-wrap"><div class="missing">PNG not rendered</div></div>`;

    const el = document.createElement('div');
    el.className = `case ${status === 'ok' ? 'open' : ''}`;
    el.dataset.status = status;
    el.dataset.type = diag.type;
    el.innerHTML = `
      <div class="case-header" onclick="toggle(this)">
        <span class="case-num ${status}">${diag.type}</span>
        <span class="case-title">${diag.name}</span>
        <span class="case-src">Excalidraw only (no Mermaid source)</span>
        <span class="case-toggle">&#9658;</span>
      </div>
      <div class="case-body">
        <div class="col">
          <div class="col-label">Mermaid SVG</div>
          <div class="img-wrap"><div class="missing">N/A — Excalidraw only</div></div>
        </div>
        <div class="col">
          <div class="col-label mine">Excalidraw PNG</div>
          ${pngCol}
        </div>
      </div>
    `;
    container.appendChild(el);
    items.push(el);
  }

  // Update stats
  document.getElementById('stats').innerHTML = 
    `<strong>${hasCount}</strong> of ${ALL_DIAGRAMS.length} diagrams have Excalidraw PNG &nbsp;|&nbsp; <strong>${ALL_DIAGRAMS.length - hasCount}</strong> missing`;

  window._items = items;
}

function toggle(header) {
  header.parentElement.classList.toggle('open');
}

function filterAll() {
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  document.querySelectorAll('.filter-btn')[1].classList.remove('active');
  document.querySelectorAll('.filter-btn')[2].classList.remove('active');
  window._items.forEach(el => el.style.display = '');
}
function filterOk() {
  document.querySelectorAll('.filter-btn')[0].classList.remove('active');
  document.querySelectorAll('.filter-btn')[1].classList.add('active');
  document.querySelectorAll('.filter-btn')[2].classList.remove('active');
  window._items.forEach(el => {
    el.style.display = el.dataset.status === 'ok' ? '' : 'none';
  });
}
function filterMiss() {
  document.querySelectorAll('.filter-btn')[0].classList.remove('active');
  document.querySelectorAll('.filter-btn')[1].classList.remove('active');
  document.querySelectorAll('.filter-btn')[2].classList.add('active');
  window._items.forEach(el => {
    el.style.display = el.dataset.status === 'miss' ? '' : 'none';
  });
}

build();
</script>
</body>
</html>
