<script>
const elements = [{"id":"0cc298bd-64f8-4ffd-8a9e-57f1b61b27ff","mermaidId":"Start","kind":"node","type":"rectangle","x":0,"y":0,"width":180,"height":60,"roughness":1,"fontFamily":"Excalifont","boundElements":[{"id":"1181e835-6047-4166-94c1-05f0013d91e6","type":"text"},{"id":"f5ad38ad-dea9-4204-a14c-d26d7960cd61","type":"arrow"}]},{"id":"1181e835-6047-4166-94c1-05f0013d91e6","mermaidId":"Start:text","kind":"label","type":"text","x":0,"y":21,"width":180,"height":18,"roughness":1,"fontFamily":"Excalifont","fontSize":14,"label":"Start","containerId":"0cc298bd-64f8-4ffd-8a9e-57f1b61b27ff"},{"id":"59c110c5-208a-4cbf-8451-730fa9012870","mermaidId":"Stop","kind":"node","type":"rectangle","x":260,"y":0,"width":180,"height":60,"roughness":1,"fontFamily":"Excalifont","boundElements":[{"id":"7a0779f4-2f46-47e3-91a3-65937d562c03","type":"text"},{"id":"f5ad38ad-dea9-4204-a14c-d26d7960cd61","type":"arrow"}]},{"id":"7a0779f4-2f46-47e3-91a3-65937d562c03","mermaidId":"Stop:text","kind":"label","type":"text","x":260,"y":21,"width":180,"height":18,"roughness":1,"fontFamily":"Excalifont","fontSize":14,"label":"Stop","containerId":"59c110c5-208a-4cbf-8451-730fa9012870"},{"id":"f5ad38ad-dea9-4204-a14c-d26d7960cd61","mermaidId":"Start->Stop:0","kind":"edge","type":"arrow","x":188,"y":30,"width":0,"height":0,"roughness":1,"fontFamily":"Excalifont","points":[[0,0],[64,0]],"startBinding":{"elementId":"0cc298bd-64f8-4ffd-8a9e-57f1b61b27ff","focus":0,"gap":8},"endBinding":{"elementId":"59c110c5-208a-4cbf-8451-730fa9012870","focus":0,"gap":8},"arrowheadStart":null,"arrowheadEnd":"arrow"}];
const offsetX = 50;
const offsetY = 50;
const width = 540;
const height = 300;

// Adjust element positions to center them
const adjustedElements = elements.map(el => ({
  ...el,
  x: (el.x || 0) + offsetX,
  y: (el.y || 0) + offsetY,
}));

// Wait for ExcalidrawLib to be available
function waitForExcalidraw() {
  return new Promise((resolve, reject) => {
    let attempts = 0;
    const check = () => {
      attempts++;
      if (window.ExcalidrawLib && window.ExcalidrawLib.exportToBlob) {
        resolve();
      } else if (attempts > 50) {
        reject(new Error('ExcalidrawLib not available'));
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

waitForExcalidraw()
  .then(async () => {
    const { exportToBlob } = window.ExcalidrawLib;
    
    const blob = await exportToBlob({
      elements: adjustedElements,
      files: null,
      mimeType: 'image/png',
      appState: {
        exportBackground: true,
        viewBackgroundColor: '#ffffff',
        width: width,
        height: height,
      }
    });
    
    const reader = new FileReader();
    reader.onload = () => {
      window.__PNG__ = reader.result;
      window.__READY__ = true;
    };
    reader.onerror = (err) => {
      window.__ERROR__ = 'FileReader error: ' + err;
    };
    reader.readAsDataURL(blob);
  })
  .catch(err => {
    window.__ERROR__ = err.message || String(err);
  });
</script>
</body>
