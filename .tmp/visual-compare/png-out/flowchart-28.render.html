function waitForExcalidraw() {
  return new Promise((resolve, reject) => {
    let attempts = 0;
    const check = () => {
      attempts++;
      if (window.ExcalidrawLib && window.ExcalidrawLib.exportToBlob) {
        resolve();

        reject(new Error('ExcalidrawLib not available'));

  });
