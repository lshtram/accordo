<script src="/lib/excalidraw-with-preact.production.min.js"></script>
<script>
const elements = [{"id":"36d2d9c9-7890-44b8-a0c2-bd4fbc2d888b","mermaidId":"A","kind":"node","type":"line","x":0,"y":0,"width":180,"height":60,"roughness":1,"fontFamily":"Excalifont","points":[[0,0],[180,0],[160,60],[20,60],[0,0]],"startBinding":null,"endBinding":null,"arrowheadStart":null,"arrowheadEnd":null,"fillStyle":"hachure","boundElements":[{"id":"534d34d2-88de-4ad3-9962-2e4c7a3eb751","type":"text"}]},{"id":"534d34d2-88de-4ad3-9962-2e4c7a3eb751","mermaidId":"A:text","kind":"label","type":"text","x":0,"y":21,"width":180,"height":18,"roughness":1,"fontFamily":"Excalifont","fontSize":14,"label":"Christmas","containerId":"36d2d9c9-7890-44b8-a0c2-bd4fbc2d888b"}];
const offsetX = 50;
const offsetY = 50;
const width = 400;
const height = 300;

// Adjust element positions to center them
const adjustedElements = elements.map(el => ({
  ...el,
  x: (el.x || 0) + offsetX,
  y: (el.y || 0) + offsetY,
}));

// Wait for ExcalidrawLib to be available
function waitForExcalidraw() {
  return new Promise((resolve, reject) => {
    let attempts = 0;
    const check = () => {
      attempts++;
      if (window.ExcalidrawLib && window.ExcalidrawLib.exportToBlob) {
        resolve();
      } else if (attempts > 50) {
        reject(new Error('ExcalidrawLib not available'));
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

waitForExcalidraw()
  .then(async () => {
    const { exportToBlob } = window.ExcalidrawLib;
    
    const blob = await exportToBlob({
      elements: adjustedElements,
      files: null,
      mimeType: 'image/png',
      appState: {
        exportBackground: true,
        viewBackgroundColor: '#ffffff',
        width: width,
        height: height,
      }
    });
    
    const reader = new FileReader();
    reader.onload = () => {
      window.__PNG__ = reader.result;
      window.__READY__ = true;
    };
    reader.onerror = (err) => {
      window.__ERROR__ = 'FileReader error: ' + err;
    };
    reader.readAsDataURL(blob);
  })
  .catch(err => {
    window.__ERROR__ = err.message || String(err);
  });
</script>
</body>
</html>
