<script>
const elements = [{"id":"dba1924f-cd6a-4cc8-8d21-2b8483167d3f","mermaidId":"id1","kind":"node","type":"rectangle","x":0,"y":0,"width":180,"height":60,"roughness":1,"fontFamily":"Excalifont","boundElements":[{"id":"3657c7a2-4ac1-49d5-b147-4d7f3ffecee1","type":"text"}]},{"id":"3657c7a2-4ac1-49d5-b147-4d7f3ffecee1","mermaidId":"id1:text","kind":"label","type":"text","x":0,"y":21,"width":180,"height":18,"roughness":1,"fontFamily":"Excalifont","fontSize":14,"label":"This is the (text) in the box","containerId":"dba1924f-cd6a-4cc8-8d21-2b8483167d3f"}];
const offsetX = 50;
const offsetY = 50;
const width = 400;
const height = 300;

// Adjust element positions to center them
const adjustedElements = elements.map(el => ({
  ...el,
  x: (el.x || 0) + offsetX,
  y: (el.y || 0) + offsetY,
}));

// Wait for ExcalidrawLib to be available
function waitForExcalidraw() {
  return new Promise((resolve, reject) => {
    let attempts = 0;
    const check = () => {
      attempts++;
      if (window.ExcalidrawLib && window.ExcalidrawLib.exportToBlob) {
        resolve();
      } else if (attempts > 50) {
        reject(new Error('ExcalidrawLib not available'));
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

waitForExcalidraw()
  .then(async () => {
    const { exportToBlob } = window.ExcalidrawLib;
    
    const blob = await exportToBlob({
      elements: adjustedElements,
      files: null,
      mimeType: 'image/png',
      appState: {
        exportBackground: true,
        viewBackgroundColor: '#ffffff',
        width: width,
        height: height,
      }
    });
    
    const reader = new FileReader();
    reader.onload = () => {
      window.__PNG__ = reader.result;
      window.__READY__ = true;
    };
    reader.onerror = (err) => {
      window.__ERROR__ = 'FileReader error: ' + err;
    };
    reader.readAsDataURL(blob);
  })
  .catch(err => {
    window.__ERROR__ = err.message || String(err);
  });
</script>
</body>
