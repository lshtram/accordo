<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Markdown Showcase Banner</title>
  <desc id="desc">Decorative banner for markdown preview testing</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="url(#bg)" rx="16" />
  <circle cx="760" cy="70" r="90" fill="#ffffff10" />
  <circle cx="120" cy="200" r="120" fill="#ffffff08" />
  <rect x="48" y="54" width="360" height="132" rx="12" fill="#0b1228" stroke="#334155" />

  <text x="70" y="95" font-family="Menlo, Consolas, monospace" font-size="22" fill="#93c5fd"># Markdown Viewer</text>
  <text x="70" y="128" font-family="Menlo, Consolas, monospace" font-size="18" fill="#a7f3d0">```mermaid</text>
  <text x="70" y="155" font-family="Menlo, Consolas, monospace" font-size="18" fill="#a7f3d0">flowchart TD</text>
  <text x="70" y="180" font-family="Menlo, Consolas, monospace" font-size="18" fill="#a7f3d0">A--&gt;B```</text>

  <rect x="448" y="54" width="404" height="132" rx="12" fill="#ffffff0d" stroke="#ffffff33" />
  <text x="472" y="98" font-family="Verdana, Geneva, sans-serif" font-size="28" fill="url(#accent)">MPE Showcase</text>
  <text x="472" y="132" font-family="Verdana, Geneva, sans-serif" font-size="16" fill="#e2e8f0">
    Mermaid • Math • Code • Tables • Footnotes
  </text>
  <text x="472" y="158" font-family="Verdana, Geneva, sans-serif" font-size="16" fill="#cbd5e1">
    Local + Remote Images • HTML Blocks
  </text>
</svg>

